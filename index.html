<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite App</title>
  <style>
    /* CSS für das Distanz-Overlay */
    #distance-overlay {
      position: absolute;
      top: 30%; /* Position über dem Pfeil */
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 10px;
      text-align: center;
      z-index: 1000; /* Sicherstellen, dass es über dem Video ist */
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DfjxDSG0.js"></script>
</head>
<body>
  <div id="overlay">
    <button id="btnStart">Start</button>
  </div>
  
  <div id="lonlatinput">
    <label for="longitude">Longitude:</label>
    <input type="number" id="longitude" step="0.000001" value="7.650252">
    <br>
    <label for="latitude">Latitude:</label>
    <input type="number" id="latitude" step="0.000001" value="51.934518">
  </div>

  <!-- Distanzanzeige als Overlay -->
  <div id="distance-overlay">0 m</div>

  <div id="app"></div>
</body>
</html>
